apiVersion: apps/v1
kind: Deployment
metadata:
  name: trend-static
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trend
  template:
    metadata:
      labels:
        app: trend
    spec:
      containers:
      - name: trend-container
        image: jagadishhak/project
        ports:
        - containerPort: 80
